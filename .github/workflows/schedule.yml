name: Scheduled Jobs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'the config to use for the Cypress environment'
        required: false
        default: 'sushi'
  schedule:
    - cron: "0/15 * * * *" # every 15 minutes

jobs:

  # attempts a booking on Tock, but only if it hasn't previously succeeded
  attempt_booking:
    name: Attempt Booking
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'sushi' }}
    steps:
      - uses: actions/checkout@v3
      - name: Check last workflow status
        id: last_status
        run: |
          LAST_STATUS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/schedule.yml/runs?per_page=2" \
            | jq -r '.workflow_runs[1].conclusion')
          echo "Last workflow conclusion: $LAST_STATUS"
          echo "last_status=$LAST_STATUS" >> $GITHUB_OUTPUT
      - uses: actions/setup-node@v3
        if: steps.last_status.outputs.last_status != 'success'
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json
      - run: echo '${{ secrets.CYPRESS_ENV }}' > cypress.env.json
        if: steps.last_status.outputs.last_status != 'success'
      - run: npm ci
        if: steps.last_status.outputs.last_status != 'success'
      - run: npm test
        if: steps.last_status.outputs.last_status != 'success'
      - uses: gautamkrishnar/keepalive-workflow@v1 # because github will kill this after 60 days
    